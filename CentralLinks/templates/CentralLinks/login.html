<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="LinkSafe es la herramienta minimalista para gestionar tus enlaces importantes. Rápido, seguro y siempre a mano.">

<meta property="og:title" content="LinkSafe - Gestor de Enlaces">
<meta property="og:description" content="Organiza tus links favoritos en un solo lugar.">
<meta property="og:type" content="website">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #b9c4f3 0%, #F7F7F7 100%);;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            border: 2px solid;
            border-color: #3E81ED;
            animation: Bordes_bonitos 4s  infinite ease-in-out;
        }

        @keyframes Bordes_bonitos {
            0% {
               border-color: #3E81ED;
            }
            50% {
               border-color: #F7F7F7;
            }
            100% {
               border-color: #3E81ED;
            }
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 16px;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #F7F7F7;
            border: 2px solid;
            border-color: #667eea;
            color: #3E81ED;
        }
    </style>
</head>
<body style="display: flex; 
        flex-direction: row;
        row-gap: 5%;
">

{% load static %}
<div class="LINK_IMG">
    <img src="{% static "CentralLinks/images/LS_LINK_BOX_CLEAN.webp" %}" 
    alt="Imagen de una caja link azul" 
    height="100%" width="100%" loading="lazy">
</div>

    <div class="login-container">
        <h1 style="border-bottom: 2px dotted; 
        border-bottom-color: #3E81ED;
        font-family: Arial, sans-serif;
        font-weight: 800;
        ">Log<span style="color: #3E81ED;">In</span></h1>

        <!--Codigo de Alejandra, esto es para enviar el formulario-->
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
    {% if form.errors %}
        <p style="color: red; text-align: center;">Usuario o contraseña incorrectos.</p>
    {% endif %}
            <div class="form-group">
                <label for="username">username</label>
                <input type="username" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" >Sign In</button>
            <p style="font-size: 16px;
            font-weight: bold;
            color: #555;
            text-align: center; 
            padding-top: 5%;
            padding-bottom: 5%;
            ">
              Don’t have an account<span style="color: #001FFF;">?</span><br>
              <a href="{% url 'register' %}" style="color: #001FFF;"
              >Create one</a>
            </p>

        </form>
    </div>
</body>
</html>
